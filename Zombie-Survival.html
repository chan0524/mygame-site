<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>게임 플레이</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    .game-container {
      width: 100%;
      height: 100%;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .top-bar {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
    }

    .back-btn {
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 13px;
    }

    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 16px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <div class="game-container">

    <!-- 뒤로가기 버튼 -->
    <div class="top-bar">
      <a href="index.html" class="back-btn">← 목록으로</a>
    </div>

    <!-- 로딩 -->
    <div class="loading">게임 로딩중...</div>

    <!-- 🔥 여기만 바꾸면 된다 -->
    <iframe src="https://html5.gamedistribution.com/53ad84c4f3b440f2b65d5382fadf731f/?gd_sdk_referrer_url=https://gamedistribution.com/games/zombie-survival-shooter-1/"></iframe>

  </div>

</body>
</html>
